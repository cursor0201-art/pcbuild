<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameZoneBuild — Профессиональный конфигуратор мощных игровых ПК</title>
    <meta name="description" content="Создайте свой идеальный игровой компьютер с помощью GameZoneBuild. Профессиональная сборка, лучшие комплектующие и гарантия качества в Узбекистане." />
    <meta name="keywords" content="сборка пк, игровой компьютер, конфигуратор пк, мощный пк, купить пк ташкент, геймерский пк" />
    <link rel="icon" type="image/png" href="/favicon.png?v=3" />
    
    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Preload critical fonts -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Outfit:wght@400;600;700;900&family=Inter:wght@400;500;600;700;900&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Outfit:wght@400;600;700;900&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <!-- DNS Prefetch for performance -->
    <link rel="dns-prefetch" href="https://images.unsplash.com">
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #020617;
        color: #ffffff;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      #root {
        height: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      /* Optimize touch interactions */
      @media (hover: none) and (pointer: coarse) {
        button, a, input, select, textarea {
          min-height: 44px;
          min-width: 44px;
        }
      }
      
      /* Prevent zoom on input focus on iOS */
      input, select, textarea {
        font-size: 16px !important;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Preload script optimization -->
    <script>
      // Disable animations on low-power devices
      if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
        document.documentElement.style.setProperty('--animation-duration', '0.01ms');
      }
    </script>
  </body>
</html>
