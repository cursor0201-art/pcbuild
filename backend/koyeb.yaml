name: pcbuilder-backend
services:
  - name: web
    source_dir: /
    docker:
      file: Dockerfile
      context: .
    ports:
      - 8000
    env:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        value: "your-production-secret-key-here"
      - key: ALLOWED_HOSTS
        value: "{{.KOYEB_APP_DOMAIN}}"
      - key: DB_NAME
        value: "pcbuilder_db"
      - key: DB_USER
        value: "pcbuilder_user"
      - key: DB_PASSWORD
        value: "{{.KOYEB_DB_PASSWORD}}"
      - key: DB_HOST
        value: "{{.KOYEB_DB_HOST}}"
      - key: DB_PORT
        value: "5432"
      - key: TELEGRAM_BOT_TOKEN
        value: "8797840133:AAHXG-d5KZdxr3ZM9xBdFX7aioECkySbLoA"
      - key: TELEGRAM_CHAT_ID
        value: "8456049332"
      - key: PAYMENT_CARD_NUMBER
        value: "8600 1234 5678 9012"
      - key: PAYMENT_CARD_HOLDER
        value: "GAMEZONE BUILD"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-cloudflare-pages-url.pages.dev"
    routes:
      - path: /api
        port: 8000
    instance_type: nano
    regions:
      - fra
    health_check:
      http:
        path: /api/admin/
        port: 8000
        interval: 30s
        timeout: 10s
        retries: 3

databases:
  - name: postgres
    type: postgresql
    version: 15
    size: nano
    regions:
      - fra
